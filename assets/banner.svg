<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080711" />
      <stop offset="50%" stop-color="#0f0e26" />
      <stop offset="100%" stop-color="#05050f" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2387" />
      <stop offset="50%" stop-color="#e94057" />
      <stop offset="100%" stop-color="#f27121" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  
  <!-- Grid Matrix (Visualizing Attention matrix) -->
  <g opacity="0.35">
    <!-- Main diagonal block/sliding window -->
    <path d="M 0,0 L 100,0 L 400,300 L 400,400 L 300,400 L 0,100 Z" fill="url(#accent-grad)" />
    <path d="M 400,0 L 500,0 L 800,300 L 800,400 L 700,400 L 400,100 Z" fill="url(#accent-grad)" />
    <path d="M 800,0 L 900,0 L 1200,300 L 1200,400 L 1100,400 L 800,100 Z" fill="url(#accent-grad)" />
  </g>
  
  <!-- Abstract network nodes / attention links -->
  <g opacity="0.25">
    <circle cx="150" cy="100" r="8" fill="#4facfe" />
    <circle cx="200" cy="280" r="5" fill="#00f2fe" />
    <circle cx="1050" cy="300" r="12" fill="#e94057" />
    <circle cx="950" cy="120" r="6" fill="#f27121" />
    <circle cx="600" cy="320" r="15" fill="#8a2387" filter="url(#glow)" />
    
    <!-- Connection lines -->
    <line x1="150" y1="100" x2="200" y2="280" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="950" y1="120" x2="1050" y2="300" stroke="#e94057" stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="600" y1="320" x2="200" y2="280" stroke="#8a2387" stroke-width="1" />
    <line x1="600" y1="320" x2="950" y2="120" stroke="#8a2387" stroke-width="1" />
  </g>

  <!-- Sliding Window Graphic Overlay (Central focus) -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <!-- Visual representations of sliding windows -->
    <rect x="-250" y="-120" width="500" height="70" rx="35" fill="#1b1937" stroke="url(#text-grad)" stroke-width="3" filter="url(#glow)" />
    
    <!-- Title Text -->
    <text y="-72" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="4">SLIDING WINDOW ATTENTION</text>
    
    <!-- Subtitle Text -->
    <text y="0" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#a0aec0" font-weight="300" letter-spacing="1.5">Evolution, Variants, Types, &amp; Applications of Local Attention</text>
  </g>
</svg>
